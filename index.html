<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Canvas Video Texture Component</title>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="js/canvas-vide-texture.js"></script>
</head>
<body>

<!-- Escena de A-Frame -->
<a-scene>
  <a-camera position="0 1.6 5"></a-camera>

  <!-- Caja que usará el video como textura a través del componente -->
  <a-box position="0 1 -3" width="4" height="2.25" depth="0.1" 
         canvas-video-texture="src: videos/video.mp4"> 
  </a-box>

  <a-light type="directional" position="-1 2 3" intensity="1.5"></a-light>
  <a-sky color="#ECECEC"></a-sky>
</a-scene>

</body>
</html>
